<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoyageIntel</title>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.119/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.119/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <style>
        html, body, #cesiumContainer {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        /* ── Toolbar ─────────────────────────────── */
        #toolbar {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 48px;
            background: rgba(20, 20, 30, 0.92);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            padding: 0 16px;
            z-index: 200;
            gap: 8px;
        }

        #toolbar .brand {
            font-size: 15px;
            font-weight: 700;
            color: #0ff;
            margin-right: 12px;
            letter-spacing: 1px;
            white-space: nowrap;
        }
        #toolbar .divider {
            width: 1px;
            height: 24px;
            background: rgba(255,255,255,0.15);
            margin: 0 6px;
            flex-shrink: 0;
        }

        /* ── Dropdown menus ──────────────────────── */
        .dropdown {
            position: relative;
        }
        .dropdown-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            user-select: none;
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            background: rgba(255,255,255,0.06);
            transition: all 0.2s;
            white-space: nowrap;
        }
        .dropdown-btn:hover {
            background: rgba(255,255,255,0.12);
            border-color: rgba(255,255,255,0.3);
        }
        .dropdown-btn .arrow {
            font-size: 10px;
            opacity: 0.6;
        }
        .dropdown-menu {
            display: none;
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            background: rgba(20, 20, 30, 0.96);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 10px;
            padding: 8px 0;
            min-width: 200px;
            z-index: 300;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        .dropdown-menu.open {
            display: block;
        }
        .dropdown-menu .toggle-all {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 14px;
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            margin-bottom: 4px;
        }
        .dropdown-menu .toggle-all button {
            background: none;
            border: none;
            color: #0ff;
            font-size: 11px;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 4px;
        }
        .dropdown-menu .toggle-all button:hover {
            background: rgba(0,255,255,0.1);
        }
        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 14px;
            cursor: pointer;
            transition: background 0.15s;
            font-size: 12px;
            color: #fff;
        }
        .dropdown-item:hover {
            background: rgba(255,255,255,0.06);
        }
        .dropdown-item input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border: 1.5px solid rgba(255,255,255,0.3);
            border-radius: 3px;
            background: transparent;
            cursor: pointer;
            position: relative;
            flex-shrink: 0;
        }
        .dropdown-item input[type="checkbox"]:checked {
            background: #0ff;
            border-color: #0ff;
        }
        .dropdown-item input[type="checkbox"]:checked::after {
            content: "✓";
            position: absolute;
            top: -1px;
            left: 1px;
            font-size: 11px;
            color: #000;
            font-weight: 700;
        }
        .dropdown-item .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .dropdown-item .item-label {
            flex: 1;
        }

        /* ── Toolbar buttons ─────────────────────── */
        .toolbar-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            user-select: none;
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            background: rgba(255,255,255,0.06);
            transition: all 0.2s;
            text-decoration: none;
            white-space: nowrap;
        }
        .toolbar-btn:hover {
            background: rgba(255,255,255,0.12);
            border-color: rgba(255,255,255,0.3);
        }
        .toolbar-btn.accent {
            color: #0ff;
            border-color: rgba(0,255,255,0.3);
        }
        .toolbar-btn.accent:hover {
            background: rgba(0,255,255,0.1);
            border-color: #0ff;
        }
        .toolbar-link {
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            font-size: 11px;
            white-space: nowrap;
            transition: color 0.2s;
        }
        .toolbar-link:hover {
            color: #fff;
        }

        /* ── Detail panel ────────────────────────── */
        #detailPanel {
            position: absolute;
            top: 48px; right: 0; bottom: 0;
            width: 320px;
            background: rgba(20, 20, 30, 0.94);
            backdrop-filter: blur(12px);
            border-left: 1px solid rgba(255,255,255,0.1);
            z-index: 150;
            transform: translateX(100%);
            transition: transform 0.3s ease;
            overflow-y: auto;
            color: #fff;
        }
        #detailPanel.open {
            transform: translateX(0);
        }
        #detailClose {
            position: absolute;
            top: 12px; right: 12px;
            background: rgba(255,255,255,0.1);
            border: none;
            color: #fff;
            font-size: 18px;
            width: 32px; height: 32px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        #detailClose:hover {
            background: rgba(255,255,255,0.2);
        }
        #detailContent {
            padding: 16px;
        }
        .detail-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            padding-right: 40px;
        }
        .detail-title {
            font-size: 18px;
            font-weight: 700;
        }
        .detail-badge {
            font-size: 10px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 8px;
            letter-spacing: 0.5px;
        }
        .detail-section {
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .detail-section:last-child {
            border-bottom: none;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 13px;
        }
        .detail-label {
            color: rgba(255,255,255,0.5);
        }
        .detail-value {
            color: #fff;
            font-weight: 500;
            text-align: right;
        }
        .flyto-btn {
            width: 100%;
            padding: 10px;
            margin-bottom: 12px;
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid rgba(0, 255, 255, 0.3);
            color: #0ff;
            font-size: 13px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .flyto-btn:hover {
            background: rgba(0, 255, 255, 0.2);
            border-color: #0ff;
        }
        .back-btn {
            width: calc(100% - 32px);
            margin: 12px 16px 0;
            padding: 8px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            font-size: 13px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .back-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        /* ── Status bar ──────────────────────────── */
        #statusBar {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 20, 30, 0.85);
            color: #fff;
            padding: 8px 24px;
            border-radius: 20px;
            font-size: 12px;
            letter-spacing: 0.3px;
            z-index: 100;
            pointer-events: none;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        .sb-item { opacity: 0.9; }
        .sb-sep {
            color: rgba(255,255,255,0.2);
            margin: 0 4px;
        }
        #trackISSBtn {
            background: rgba(255,214,0,0.15);
            border: 1px solid #FFD600;
            color: #FFD600;
            border-radius: 12px;
            padding: 4px 12px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            pointer-events: auto;
        }
        #trackISSBtn:hover {
            background: rgba(255,214,0,0.3);
        }

        /* ── Loading ─────────────────────────────── */
        #loadingOverlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #0ff;
            font-size: 18px;
            z-index: 300;
            text-align: center;
        }
        #loadingOverlay .spinner {
            display: inline-block;
            width: 24px; height: 24px;
            border: 3px solid rgba(0,255,255,0.3);
            border-top-color: #0ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .cesium-credit-logoContainer { display: none !important; }
    </style>
    <script>window.__CESIUM_TOKEN__ = "%%CESIUM_TOKEN%%";</script>
</head>
<body>
    <div id="cesiumContainer"></div>

    <!-- Toolbar -->
    <div id="toolbar">
        <span class="brand">VoyageIntel</span>
        <div class="divider"></div>

        <!-- Flights Dropdown -->
        <div class="dropdown" id="flightsDropdown">
            <button class="dropdown-btn" onclick="toggleDropdown('flightsDropdown')">✈ Flights <span class="arrow">▾</span></button>
            <div class="dropdown-menu">
                <div class="toggle-all">
                    <span>Toggle</span>
                    <div>
                        <button onclick="setAllFlights(true)">Show All</button>
                        <button onclick="setAllFlights(false)">Hide All</button>
                    </div>
                </div>
                <label class="dropdown-item" onclick="event.stopPropagation()">
                    <input type="checkbox" checked data-type="flight" data-value="commercial">
                    <span class="dot" style="background:#fff"></span>
                    <span class="item-label">Commercial</span>
                </label>
                <label class="dropdown-item" onclick="event.stopPropagation()">
                    <input type="checkbox" checked data-type="flight" data-value="military">
                    <span class="dot" style="background:#ef5350"></span>
                    <span class="item-label">Military</span>
                </label>
                <label class="dropdown-item" onclick="event.stopPropagation()">
                    <input type="checkbox" checked data-type="flight" data-value="private">
                    <span class="dot" style="background:#CE93D8"></span>
                    <span class="item-label">Private</span>
                </label>
            </div>
        </div>

        <!-- Satellites Dropdown -->
        <div class="dropdown" id="satellitesDropdown">
            <button class="dropdown-btn" onclick="toggleDropdown('satellitesDropdown')">🛰 Satellites <span class="arrow">▾</span></button>
            <div class="dropdown-menu">
                <div class="toggle-all">
                    <span>Toggle</span>
                    <div>
                        <button onclick="setAllSatellites(true)">Show All</button>
                        <button onclick="setAllSatellites(false)">Hide All</button>
                    </div>
                </div>
                <label class="dropdown-item" onclick="event.stopPropagation()">
                    <input type="checkbox" checked data-type="sat" data-value="iss">
                    <span class="dot" style="background:#FFD600"></span>
                    <span class="item-label">Space Stations</span>
                </label>
                <label class="dropdown-item" onclick="event.stopPropagation()">
                    <input type="checkbox" checked data-type="sat" data-value="military">
                    <span class="dot" style="background:#ef5350"></span>
                    <span class="item-label">Military</span>
                </label>
                <label class="dropdown-item" onclick="event.stopPropagation()">
                    <input type="checkbox" checked data-type="sat" data-value="weather">
                    <span class="dot" style="background:#00BFFF"></span>
                    <span class="item-label">Weather</span>
                </label>
                <label class="dropdown-item" onclick="event.stopPropagation()">
                    <input type="checkbox" checked data-type="sat" data-value="nav">
                    <span class="dot" style="background:#00E676"></span>
                    <span class="item-label">Nav</span>
                </label>
                <label class="dropdown-item" onclick="event.stopPropagation()">
                    <input type="checkbox" checked data-type="sat" data-value="science">
                    <span class="dot" style="background:#FF9800"></span>
                    <span class="item-label">Science</span>
                </label>
                <label class="dropdown-item" onclick="event.stopPropagation()">
                    <input type="checkbox" data-type="sat" data-value="starlink">
                    <span class="dot" style="background:#6495ED"></span>
                    <span class="item-label">Starlink</span>
                </label>
            </div>
        </div>

        <!-- Vessels Dropdown -->
        <div class="dropdown" id="vesselsDropdown">
            <button class="dropdown-btn" onclick="toggleDropdown('vesselsDropdown')">🚢 Vessels <span class="arrow">▾</span></button>
            <div class="dropdown-menu">
                <div class="toggle-all">
                    <span>Toggle</span>
                    <div>
                        <button onclick="setAllVessels(true)">Show All</button>
                        <button onclick="setAllVessels(false)">Hide All</button>
                    </div>
                </div>
                <label class="dropdown-item" onclick="event.stopPropagation()">
                    <input type="checkbox" checked data-type="vessel" data-value="cargo">
                    <span class="dot" style="background:#4FC3F7"></span>
                    <span class="item-label">Cargo</span>
                </label>
                <label class="dropdown-item" onclick="event.stopPropagation()">
                    <input type="checkbox" checked data-type="vessel" data-value="tanker">
                    <span class="dot" style="background:#FF8A65"></span>
                    <span class="item-label">Tanker</span>
                </label>
                <label class="dropdown-item" onclick="event.stopPropagation()">
                    <input type="checkbox" checked data-type="vessel" data-value="passenger">
                    <span class="dot" style="background:#fff"></span>
                    <span class="item-label">Passenger</span>
                </label>
                <label class="dropdown-item" onclick="event.stopPropagation()">
                    <input type="checkbox" checked data-type="vessel" data-value="military">
                    <span class="dot" style="background:#EF5350"></span>
                    <span class="item-label">Naval</span>
                </label>
                <label class="dropdown-item" onclick="event.stopPropagation()">
                    <input type="checkbox" checked data-type="vessel" data-value="fishing">
                    <span class="dot" style="background:#66BB6A"></span>
                    <span class="item-label">Fishing</span>
                </label>
                <label class="dropdown-item" onclick="event.stopPropagation()">
                    <input type="checkbox" checked data-type="vessel" data-value="recreational">
                    <span class="dot" style="background:#00BCD4"></span>
                    <span class="item-label">Recreational</span>
                </label>
                <label class="dropdown-item" onclick="event.stopPropagation()">
                    <input type="checkbox" checked data-type="vessel" data-value="special">
                    <span class="dot" style="background:#AB47BC"></span>
                    <span class="item-label">Special</span>
                </label>
                <label class="dropdown-item" onclick="event.stopPropagation()">
                    <input type="checkbox" checked data-type="vessel" data-value="high_speed">
                    <span class="dot" style="background:#FFD54F"></span>
                    <span class="item-label">High Speed</span>
                </label>
            </div>
        </div>

        <div class="divider"></div>

        <button class="toolbar-btn accent" onclick="shareSnapshot()">📤 Share</button>

        <div class="divider"></div>

        <span style="font-size:10px; text-transform:uppercase; color:rgba(255,255,255,0.4); letter-spacing:1px; white-space:nowrap;">Layers</span>
        <select id="layerPicker" style="background:rgba(255,255,255,0.1); color:#fff; border:1px solid rgba(255,255,255,0.2); border-radius:8px; padding:4px 8px; font-size:12px; cursor:pointer;">
            <option value="dark">🌑 Dark</option>
            <option value="satellite">🛰 Satellite</option>
            <option value="streets">🗺 Streets</option>
            <option value="terrain">⛰ Terrain</option>
        </select>

        <button class="toolbar-btn accent" onclick="openSettings()">⚙ Settings</button>

        <div style="flex:1"></div>
        <a href="https://github.com/0xchamin/skyintel" target="_blank" class="toolbar-link">⭐ GitHub</a>
        <a href="https://pypi.org/project/skyintel/" target="_blank" class="toolbar-link">📦 PyPI</a>
        <a href="https://buymeacoffee.com/0xchamin" target="_blank" class="toolbar-link">☕ Support</a>
        <a href="https://buttondown.com/skyintel" target="_blank" class="toolbar-link">🚀 Waitlist</a>
            
    </div>

    <!-- Detail panel -->
    <div id="detailPanel">
        <button id="detailClose">✕</button>
        <button id="backBtn" class="back-btn" style="display:none" onclick="flyBack()">⬅ Return to overview</button>
        <div id="detailContent"></div>
    </div>

    <!-- Status bar -->
    <div id="statusBar">
        <span id="flightStatusBar">✈ 0</span>
        <span class="sb-sep">|</span>
        <span id="vesselStatusBar">🚢 0</span>
        <span class="sb-sep">|</span>
        <span id="satStatusBar">🛰 0</span>
        <span class="sb-sep">|</span>
        <button id="trackISSBtn" onclick="trackISS()">🛰 Track ISS</button>
    </div>

    <!-- Loading -->
    <div id="loadingOverlay">
        <div class="spinner"></div>
        <div>🔭 Loading…</div>
    </div>

    <!-- Chat FAB -->
    <button id="chatBtn" style="
        position:fixed; bottom:24px; right:24px; z-index:200;
        width:56px; height:56px; border-radius:50%;
        background:rgba(0,255,255,0.15); border:2px solid #0ff;
        color:#0ff; font-size:24px; cursor:pointer;
        backdrop-filter:blur(8px); box-shadow:0 4px 16px rgba(0,0,0,0.4);
        transition:all 0.2s;
    " onmouseover="this.style.background='rgba(0,255,255,0.3)'"
       onmouseout="this.style.background='rgba(0,255,255,0.15)'"
    >💬</button>

    <script src="/static/flights.js"></script>
    <script src="/static/satellites.js"></script>
    <script src="/static/vessels.js"></script>
    <script src="/static/detail.js"></script>
    <script src="/static/share.js"></script>
    <script src="/static/layers.js"></script>
    <script src="/static/settings.js"></script>
    <script src="/static/chat.js"></script>

    <script>
        // ── Dropdown logic ──────────────────────────
        function toggleDropdown(id) {
            const dropdown = document.getElementById(id);
            const menu = dropdown.querySelector('.dropdown-menu');
            const wasOpen = menu.classList.contains('open');

            // Close all dropdowns first
            document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('open'));

            if (!wasOpen) {
                menu.classList.add('open');
            }
        }

        // Close dropdowns on click outside
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.dropdown')) {
                document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('open'));
            }
        });

        // Checkbox change handlers
        document.querySelectorAll('.dropdown-item input[type="checkbox"]').forEach(cb => {
            cb.addEventListener('change', () => {
                const type = cb.dataset.type;
                const value = cb.dataset.value;
                const checked = cb.checked;

                if (type === 'flight') {
                    setFlightToggle(value, checked, viewer);
                } else if (type === 'sat') {
                    setSatToggle(value, checked, viewer);
                } else if (type === 'vessel') {
                    setVesselToggle(value, checked, viewer);
                }
            });
        });

        function setAllFlights(state) {
            document.querySelectorAll('input[data-type="flight"]').forEach(cb => {
                cb.checked = state;
                setFlightToggle(cb.dataset.value, state, viewer);
            });
        }

        function setAllSatellites(state) {
            document.querySelectorAll('input[data-type="sat"]').forEach(cb => {
                cb.checked = state;
                setSatToggle(cb.dataset.value, state, viewer);
            });
        }

        function setAllVessels(state) {
            document.querySelectorAll('input[data-type="vessel"]').forEach(cb => {
                cb.checked = state;
                setVesselToggle(cb.dataset.value, state, viewer);
            });
        }

        // ── Cesium viewer ───────────────────────────
        const viewer = new Cesium.Viewer("cesiumContainer", {
            imageryProvider: false,
            baseLayerPicker: false,
            geocoder: false,
            homeButton: false,
            sceneModePicker: false,
            navigationHelpButton: false,
            animation: false,
            timeline: false,
            fullscreenButton: false,
            vrButton: false,
            infoBox: false,
            selectionIndicator: false,
            creditContainer: document.createElement("div"),
        });

        viewer.imageryLayers.addImageryProvider(
            new Cesium.UrlTemplateImageryProvider({
                url: "https://basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}.png",
                credit: new Cesium.Credit("© CARTO © OpenStreetMap contributors"),
            })
        );

        viewer.scene.globe.enableLighting = true;
        viewer.scene.skyAtmosphere.show = true;
        viewer.scene.fog.enabled = true;

        viewer.camera.setView({
            destination: Cesium.Cartesian3.fromDegrees(10, 20, 25000000),
            orientation: {
                heading: Cesium.Math.toRadians(0),
                pitch: Cesium.Math.toRadians(-90),
                roll: 0,
            },
        });

        // Init panels
        initDetailPanel(viewer);
        initChatPanel();

        // Chat button
        document.getElementById("chatBtn").addEventListener("click", toggleChat);

        // Start tracking
        Promise.all([
            startFlightTracking(viewer),
            startSatelliteTracking(viewer),
            startVesselTracking(viewer),
        ]).then(() => {
            document.getElementById("loadingOverlay").style.display = "none";
        });
    </script>
</body>
</html>
